<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Hora inversa - JavaScript</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1>Calculadora de hora inversa</h1>
    <form id="form">
        <label>Hora (0-23): <input type="number" id="hora" min="0" max="23" required></label><br>
        <label>Minutos (0-59): <input type="number" id="minutos" min="0" max="59" required></label><br>
        <button type="submit">Calcular</button>
    </form>
    <p id="resultado"></p>
</body>
</html>
